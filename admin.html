<!doctype html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>EcoCanje Admin - Panel de Gestión</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    
    <script id="tailwind-config">
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#006a2b",
              "primary-dim": "#005d25",
              "primary-container": "#72fe8f",
              surface: "#f6f7f6",
              "on-surface": "#2c2f2f",
              error: "#b02500",
            },
            fontFamily: { headline: ["Manrope"], body: ["Inter"] },
          },
        },
      };
    </script>
</head>

<body class="bg-surface font-body text-on-surface antialiased">
    <nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-xl border-b border-gray-100">
      <div class="flex justify-between items-center w-full px-6 py-4 max-w-7xl mx-auto">
        <div class="flex items-center gap-4">
          <a href="index.html" class="text-2xl font-black text-primary tracking-tighter font-headline">EcoCanje</a>
        </div>
        <div class="flex items-center gap-4">
            <span id="user-email" class="text-xs font-bold text-on-surface-variant">Cargando...</span>
            <button onclick="cerrarSesion()" class="material-symbols-outlined text-error">logout</button>
        </div>
      </div>
    </nav>

    <main class="md:ml-64 pt-28 pb-12 px-6 min-h-screen">
      <header class="mb-10">
        <h1 class="text-4xl font-black font-headline tracking-tighter">Panel de Control</h1>
        <p class="text-on-surface-variant mt-1 font-medium italic">Gestión de impacto ambiental - UCV Caribia</p>
      </header>

      <section class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-gray-100">
          <h3 class="text-on-surface-variant text-xs font-bold uppercase">Entregas Totales</h3>
          <p id="stat-entregas" class="text-4xl font-black font-headline mt-2 text-primary">...</p>
        </div>
        <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-gray-100">
          <h3 class="text-on-surface-variant text-xs font-bold uppercase">Usuarios UCV</h3>
          <p id="stat-usuarios" class="text-4xl font-black font-headline mt-2 text-on-surface">...</p>
        </div>
        <div class="bg-primary p-8 rounded-[2.5rem] text-white">
          <h3 class="text-white/70 text-[10px] font-black uppercase">Estado del Sistema</h3>
          <p class="text-2xl font-black font-headline mt-2">NODO ACTIVO</p>
        </div>
      </section>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <section class="lg:col-span-2">
          <div class="bg-white rounded-[2.5rem] shadow-sm border border-gray-100 overflow-hidden">
            <div class="p-8 border-b border-gray-50 flex justify-between">
              <h2 class="text-xl font-black font-headline">Estudiantes Registrados</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                  <thead class="bg-gray-50/50 text-[10px] uppercase font-black tracking-widest">
                    <tr>
                      <th class="px-8 py-4">Usuario</th>
                      <th class="px-8 py-4">Tokens</th>
                      <th class="px-8 py-4 text-right">Rol</th>
                    </tr>
                  </thead>
                  <tbody id="tabla-usuarios" class="divide-y divide-gray-50 text-sm">
                    </tbody>
                </table>
            </div>
          </div>
        </section>

        <section>
          <h2 class="text-xl font-black font-headline mb-6">Validaciones Pendientes</h2>
          <div id="lista-pendientes" class="space-y-4">
            </div>
        </section>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const SUPABASE_URL = 'https://bnhjmjvioumlpucqivfe.supabase.co';
      const SUPABASE_KEY = 'Sb_publishable_hay5zTgbMYTKTwleDE5Dpg_pvZQX-ad';
      const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      // 1. Proteger la ruta (Solo para chichobs@gmail.com)
      async function checkAdmin() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (!user || user.email.toLowerCase().trim() !== 'chichobs206@gmail.com') {
          alert("Acceso denegado: Se requieren credenciales de Administrador.");
          window.location.href = 'login.html';
          return;
        }
        document.getElementById('user-email').innerText = user.email;
        cargarDatos();
      }

      async function cargarDatos() {
        // Cargar Estadísticas
        const { count: countEntregas } = await _supabase.from('entregas').select('*', { count: 'exact', head: true });
        const { count: countUsers } = await _supabase.from('usuarios').select('*', { count: 'exact', head: true });
        
        document.getElementById('stat-entregas').innerText = countEntregas || 0;
        document.getElementById('stat-usuarios').innerText = countUsers || 0;

        // Cargar Tabla de Usuarios
        const { data: usuarios } = await _supabase.from('usuarios').select('*').order('fecha_registro', { ascending: false });
        const tbody = document.getElementById('tabla-usuarios');
        tbody.innerHTML = usuarios.map(u => `
          <tr class="hover:bg-green-50/30">
            <td class="px-8 py-6">
              <p class="font-black">${u.nombre_completo || 'Sin nombre'}</p>
              <p class="text-[10px] text-gray-500">${u.correo_electronico}</p>
            </td>
            <td class="px-8 py-6 font-bold text-primary">${u.tokens_acumulados} ECO</td>
            <td class="px-8 py-6 text-right"><span class="px-2 py-1 bg-gray-100 rounded text-[10px] uppercase">${u.rol}</span></td>
          </tr>
        `).join('');

        // Cargar Pendientes
        const { data: pendientes } = await _supabase.from('entregas').select('*').eq('estado', 'pendiente');
        const lista = document.getElementById('lista-pendientes');
        lista.innerHTML = pendientes.length ? pendientes.map(p => `
            <div class="bg-white p-6 rounded-[2rem] border-l-4 border-blue-500 shadow-sm">
                <p class="font-black text-sm">Entrega #${p.id}</p>
                <p class="text-[10px] text-gray-500 mb-4">Tokens a sumar: ${p.tokens_estimados}</p>
                <button onclick="validarEntrega(${p.id}, ${p.tokens_estimados})" class="w-full bg-primary text-white py-3 rounded-2xl font-black text-[10px] uppercase">Aprobar y Sumar</button>
            </div>
        `).join('') : '<p class="text-sm italic text-gray-400">No hay entregas pendientes.</p>';
      }

      async function validarEntrega(id, tokens) {
        // Lógica para cambiar estado y podrías añadir aquí el UPDATE a la tabla usuarios
        const { error } = await _supabase.from('entregas').update({ estado: 'aprobado' }).eq('id', id);
        if (!error) {
            alert("Entrega validada con éxito");
            cargarDatos();
        }
      }

      async function cerrarSesion() {
        await _supabase.auth.signOut();
        window.location.href = 'login.html';
      }

      checkAdmin();
    </script>
</body>
</html>
