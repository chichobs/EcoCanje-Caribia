<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>EcoCanje - Registro</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    
    <script id="tailwind-config">
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "surface-bright": "#f6f7f6",
              primary: "#006a2b",
              "primary-dim": "#005d25",
              "primary-container": "#72fe8f",
              "on-primary-container": "#005f26",
              background: "#f6f7f6",
              "on-surface": "#2c2f2f",
              "on-surface-variant": "#595c5b",
              "surface-container-low": "#eff1f0",
              "surface-container-lowest": "#ffffff",
              "secondary-container": "#cfe6f2",
            },
            fontFamily: {
              headline: ["Manrope"],
              body: ["Inter"],
            },
          },
        },
      };
    </script>
    <style>
      .glass-card {
        background: rgba(255, 255, 255, 0.4);
        backdrop-filter: blur(20px);
      }
    </style>
</head>

<body class="bg-background font-body text-on-surface">
    <main class="min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
      <div class="absolute -top-24 -left-24 w-96 h-96 bg-primary-container/20 rounded-full blur-3xl"></div>
      <div class="absolute -bottom-48 -right-48 w-[32rem] h-[32rem] bg-secondary-container/30 rounded-full blur-3xl"></div>

      <div class="w-full max-w-6xl grid grid-cols-1 lg:grid-cols-2 gap-12 items-center relative z-10">
        
        <div class="hidden lg:flex flex-col space-y-8">
          <div>
            <span class="inline-block py-1 px-4 rounded-full bg-primary-container text-on-primary-container font-semibold text-sm mb-6">Únete al cambio</span>
            <h1 class="font-headline font-extrabold text-6xl text-primary tracking-tighter leading-none mb-4">EcoCanje</h1>
            <p class="font-headline text-3xl text-on-surface-variant font-bold max-w-md">Empieza a transformar tus residuos en valor.</p>
          </div>
          
          <div class="grid grid-cols-2 gap-4">
            <div class="glass-card p-6 rounded-2xl shadow-sm">
              <span class="material-symbols-outlined text-primary mb-3">recycling</span>
              <div class="text-2xl font-headline font-black text-on-surface">15k+</div>
              <div class="text-sm text-on-surface-variant">Usuarios activos</div>
            </div>
          </div>
        </div>

        <div class="w-full">
          <div class="bg-surface-container-lowest p-8 md:p-12 rounded-3xl shadow-xl">
            <div class="mb-8">
              <h2 class="font-headline text-3xl font-bold text-on-surface mb-2">Crea tu cuenta</h2>
              <p class="text-on-surface-variant">Regístrate para comenzar tu huella positiva hoy.</p>
            </div>

            <form id="registroForm" class="space-y-6">
              <div class="space-y-2">
                <label class="text-sm font-semibold text-on-surface-variant px-1" for="full_name">Nombre Completo</label>
                <input class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary transition-all" id="full_name" placeholder="Ej. Juan Pérez" type="text" required />
              </div>

              <div class="space-y-2">
                <label class="text-sm font-semibold text-on-surface-variant px-1" for="email">Correo Electrónico</label>
                <input class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary transition-all" id="email" placeholder="nombre@ejemplo.com" type="email" required />
              </div>

              <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-2">
                  <label class="text-sm font-semibold text-on-surface-variant px-1" for="password">Contraseña</label>
                  <input class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary transition-all" id="password" placeholder="••••••••" type="password" required />
                </div>
                <div class="space-y-2">
                  <label class="text-sm font-semibold text-on-surface-variant px-1" for="confirm_password">Confirmar</label>
                  <input class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary transition-all" id="confirm_password" placeholder="••••••••" type="password" required />
                </div>
              </div>

              <div class="flex items-start space-x-3 py-2">
                <input class="w-5 h-5 border-none bg-surface-container-low rounded text-primary focus:ring-primary" id="terms" type="checkbox" required />
                <label class="text-sm text-on-surface-variant" for="terms">Acepto los términos y condiciones ambientales.</label>
              </div>

              <button class="w-full py-4 px-6 bg-gradient-to-r from-primary to-primary-dim text-white font-bold text-lg rounded-full shadow-lg hover:scale-[1.02] active:scale-95 transition-all flex justify-center items-center" type="submit">
                Unirme a la Comunidad
                <span class="material-symbols-outlined ml-2">eco</span>
              </button>

              <div class="relative flex items-center py-2">
                <div class="flex-grow border-t border-gray-200"></div>
                <span class="flex-shrink mx-4 text-gray-400 text-sm">o</span>
                <div class="flex-grow border-t border-gray-200"></div>
              </div>

              <button onclick="loginConGoogle()" type="button" class="w-full py-3 px-6 bg-white border border-gray-200 text-gray-700 font-semibold rounded-full flex justify-center items-center hover:bg-gray-50 transition-all shadow-sm">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5 mr-3" alt="Google">
                Continuar con Google
              </button>
            </form>

            <div class="mt-8 pt-8 border-t border-gray-100 text-center">
              <p class="text-on-surface-variant">¿Ya tienes cuenta? <a class="text-primary font-bold hover:underline ml-1" href="login.html">Iniciar sesión</a></p>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
      // Tus credenciales de Supabase
      const SUPABASE_URL = 'https://bnhjmjvioumlpucqivfe.supabase.co';
      const SUPABASE_KEY = 'sb_publishable_hay5zTgbMYTKTwleDE5Dpg_pvZQX-ad'; 
      const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      // 1. Lógica para el Registro Manual
      document.getElementById('registroForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm_password').value;
        const fullName = document.getElementById('full_name').value;

        if (password !== confirmPassword) {
          alert("¡Cuidado! Las contraseñas no coinciden.");
          return;
        }

        const { data, error } = await _supabase.auth.signUp({
          email: email,
          password: password,
          options: {
            data: {
              full_name: fullName,
              display_name: fullName
            }
          }
        });

        if (error) {
          alert("Error: " + error.message);
        } else {
          alert("¡Registro enviado! Por favor, revisa tu correo electrónico para confirmar la cuenta antes de entrar.");
        }
      });

      // 2. Lógica para Inicio de Sesión / Registro con Google
      async function loginConGoogle() {
        const { error } = await _supabase.auth.signInWithOAuth({
          provider: 'google',
          options: {
            // Esto redirigirá al usuario a la página principal después de loguearse
            redirectTo: window.location.origin + '/usuario.html'
          }
        });
        
        if (error) {
          alert("Hubo un problema con Google: " + error.message);
        }
      }
    </script>
</body>
</html>
